<svg width="32" height="32" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="solid_p_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" />
      <feComposite in="SourceGraphic" operator="over" />
    </filter>
  </defs>
  
  <rect x="0" y="0" width="100" height="100" rx="18" fill="white" />

  <path
    d="M 35 75 V 25 H 50 A 15 15 0 0 1 50 55 H 35"
    stroke="url(#solid_p_grad)"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#f)"
    stroke-dasharray="175 175"
    stroke-dashoffset="0"
  >
    <animate 
      attributeName="stroke-dashoffset" 
      values="0; 0; -175; -350; -350" 
      keyTimes="0; 0.2; 0.45; 0.8; 1" 
      dur="6s" 
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"
    />
  </path>
</svg>
