<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
  <defs>
    <linearGradient id="solid_n_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  
  <path
    class="logo-path"
    d="M 30 70 V 30 L 70 70 V 30"
    stroke="url(#solid_n_grad)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    stroke-dasharray="220"
    stroke-dashoffset="220"
  >
    <animate 
      attributeName="stroke-dashoffset" 
      values="220; 0; 0; -220; -220" 
      keyTimes="0; 0.2; 0.79; 0.99; 1" 
      dur="6s" 
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
    />
  </path>
</svg>