<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
  <defs>
    <linearGradient id="solid_p_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  
  <path
    class="logo-path"
    d="M 35 75 V 25 H 50 A 15 15 0 0 1 50 55 H 35"
    stroke="url(#solid_p_grad)"
