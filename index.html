﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍌 Nano Generator</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23FFD700' d='M12 2C8.5 2 5.5 4.5 4.5 8c-.5 2 .5 4 2 5.5 0 1.5-1 2.5-1.5 4 0 2.5 2 4.5 4.5 4.5 1.5 0 2.5-.5 3.5-1.5.5 1.5.5 3.5 1.5 5.5 0 2-1 3.5-2.5 4-1.5.5-3.5 0-5-1.5-2-3.5-2-5 0-2 1-3.5 2.5-4.5-.5-1.5-.5-3.5-.5-5.5 0-1.5.5-2.5 1.5-3.5-.5-1-1.5-1.5-3-1.5-2 0-3.5 1-4.5 3z'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="panzoom.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 overflow-hidden">
    <div id="text-measure" class="absolute invisible whitespace-nowrap text-sm px-3 py-2 font-sans"></div>

    <!-- 全屏画布层 -->
    <div id="canvasLayer" class="fixed inset-0 z-0 pointer-events-auto">
        <div id="canvasViewport" class="w-full h-full">
            <div id="canvas" class="absolute origin-center transition-transform duration-75 ease-out">
                <!-- 调试网格 -->
                <div id="debugGrid" class="absolute inset-0 pointer-events-none hidden">
                    <svg width="10000" height="10000" viewBox="0 0 10000 10000" xmlns="http://www.w3.org/2000/svg" id="debugGridSvg">
                    </svg>
                </div>
                <div id="imageResponseContainer">
                </div>
            </div>
        </div>
    </div>

    <!-- UI悬浮层 -->
    <div id="uiLayer" class="fixed inset-0 z-10 pointer-events-none">
        <!-- 标题 -->
        <header class="pointer-events-auto absolute top-4 left-4 flex items-center gap-3">
            <img src="logo.svg" alt="Nano Generator Logo" class="w-12 h-12">
            <h1 class="text-2xl font-bold text-gray-900">Nano Generator</h1>
        </header>

        <!-- 可拖动的UI面板 -->
        <div id="uiPanel" class="pointer-events-auto absolute top-1/2 -translate-y-1/2 right-4 w-[400px] max-w-[90vw] max-h-[calc(100vh-80px)] overflow-y-auto">
<!-- 提示词面板 -->
            <div class="glass-card rounded-2xl p-4 shadow-sm pointer-events-auto">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-medium text-gray-700">提示词面板</label>
                    <button id="togglePromptPanel" class="text-sm text-blue-600 hover:text-blue-700">折叠</button>
                </div>
                <div id="promptPanel">
                    <div id="promptContainer" class="w-full px-3 py-1.5 rounded-xl border border-gray-200 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent outline-none transition-all bg-white min-h-[100px]">
                        <div id="promptInput" contenteditable="true" 
                            class="w-full border-none outline-none resize-none bg-transparent text-gray-700 placeholder-gray-400 whitespace-pre-wrap text-sm"
                            data-placeholder="请输入提示词，&#10;Ctrl + Enter直接发送，&#10;Enter进行换行。"></div>
                    </div>
                    
                    <!-- 任务类型 Tab -->
                    <div class="mt-4 flex border border-gray-200 rounded-lg overflow-hidden">
                        <button id="tabText" class="flex-1 py-2 px-3 text-sm font-medium bg-gray-50 text-gray-700 hover:bg-blue-50 border-r border-gray-200">📝 文本</button>
                        <button id="tabImage" class="flex-1 py-2 px-3 text-sm font-medium bg-blue-600 text-white">🖼️ 图片</button>
                        <button id="tabVideo" class="flex-1 py-2 px-3 text-sm font-medium bg-gray-50 text-gray-700 hover:bg-purple-50">🎬 视频</button>
                    </div>
                    
                    <!-- 模型参数 -->
                    <div id="modelParams" class="mt-4">
                        <h3 class="text-sm font-semibold text-gray-700 mb-3">模型参数</h3>
                        
                        <!-- 图片模式参数 -->
                        <div id="imageParams">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">图片模型</label>
                                    <div class="custom-select-wrapper" id="imageModelNameWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">选择模型</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">宽高比</label>
                                    <select id="aspectRatio" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"></select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">分辨率</label>
                                <select id="imageSize" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                    <option value="512px">0.5K (512×512)</option>
                                    <option value="1K">1K (1024×1024)</option>
                                    <option value="2K">2K (1920×1080)</option>
                                    <option value="4K">4K (3840×2160)</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- 视频模式参数 -->
                        <div id="videoParams" class="hidden">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">视频模型</label>
                                    <div class="custom-select-wrapper" id="videoModelNameWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">选择模型</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">视频比例</label>
                                    <select id="videoRatioSelect" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                        <option value="16:9">16:9 横屏</option>
                                        <option value="9:16">9:16 竖屏</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">视频时长</label>
                                    <select id="videoDurationSelect" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                        <option value="4">4 秒</option>
                                        <option value="6" selected>6 秒</option>
                                        <option value="8">8 秒</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">分辨率</label>
                                    <select id="videoResolutionSelect" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                        <option value="720p">720p</option>
                                        <option value="1080p">1080p</option>
                                        <option value="4k">4K</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 文本模式参数 -->
                        <div id="textParams" class="hidden">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">文本/识图模型</label>
                                    <div class="custom-select-wrapper" id="textModelNameWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">选择模型</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Temperature</label>
                                    <input type="number" id="temperature" value="0.7" min="0" max="1" step="0.1" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Top P</label>
                                    <input type="number" id="topP" value="0.95" min="0" max="1" step="0.05" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex justify-between items-center">
                        <span id="statusTag" class="text-xs px-2 py-1 rounded bg-gray-50 text-gray-600">就绪</span>
                        <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium text-sm flex items-center gap-2">
                            <span>发送</span>
                            <div id="loader" class="hidden animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 调试控制台 -->
        <div id="debugConsole" class="debug-console collapsed pointer-events-auto">
            <div class="debug-console-header">
                <span class="debug-console-title">调试控制台面板</span>
                <span class="debug-console-toggle">▼</span>
            </div>
            <div class="debug-console-content" id="debugConsoleContent">
            </div>
            <div class="debug-console-footer">
                <div class="debug-console-footer-left">
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleMouse" class="debug-console-mouse-checkbox">
                        <span>显示鼠标日志</span>
                    </label>
                </div>
                <div class="debug-console-footer-center">
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleMarker" class="debug-console-mouse-checkbox">
                        <span>中心标记</span>
                    </label>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleGrid" class="debug-console-mouse-checkbox">
                        <span>调试网格</span>
                    </label>
                    <span class="debug-console-divider">|</span>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleSample" class="debug-console-mouse-checkbox">
                        <span>样例图片</span>
                    </label>
                    <span class="debug-console-divider">|</span>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleCoords" class="debug-console-mouse-checkbox">
                        <span>节点坐标</span>
                    </label>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleTime" class="debug-console-mouse-checkbox" checked>
                        <span>生成耗时</span>
                    </label>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleModelTag" class="debug-console-mouse-checkbox" checked>
                        <span>模型标签</span>
                    </label>
                </div>
                <div class="debug-console-footer-right">
                    <button class="debug-console-clear" id="debugConsoleClear">清空</button>
                </div>
            </div>
        </div>

        <!-- 画布缩略图 -->
        <div id="canvasMinimap" class="fixed left-4 z-20 pointer-events-auto">
            <div class="minimap-container">
                <div class="minimap-header">
                    <span class="minimap-title">画布导航</span>
                </div>
                <div id="minimapContent" class="minimap-content">
                    <div id="minimapCanvas" class="minimap-canvas">
                        <div id="minimapViewport" class="minimap-viewport"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 迷你工具栏 -->
        <div id="miniToolbar" class="fixed left-1/2 transform -translate-x-1/2 z-20 pointer-events-auto">
            <div class="flex items-center gap-2">
                <button id="uploadImageBtn" class="toolbar-upload-btn">
                    <svg class="toolbar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </button>
                <input type="file" id="imageUploadInput" accept="image/*" class="hidden">
                
                <!-- 缩放控制按钮 -->
                <div class="flex items-center gap-1 bg-white rounded-full shadow-lg px-2 py-1">
                    <button id="toolbarZoomReset" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600" title="重置缩放">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                    </button>
                    <button id="toolbarZoomOut" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600 font-bold" title="缩小">−</button>
                    <span id="toolbarZoomValue" class="text-sm font-semibold text-gray-700 min-w-[48px] text-center cursor-pointer" title="点击重置">100%</span>
                    <button id="toolbarZoomIn" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600 font-bold" title="放大">+</button>
                    <button id="toolbarCenterCanvas" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600" title="回到画布中心">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <line x1="12" y1="2" x2="12" y2="6"/>
                            <line x1="12" y1="18" x2="12" y2="22"/>
                            <line x1="2" y1="12" x2="6" y2="12"/>
                            <line x1="18" y1="12" x2="22" y2="12"/>
                        </svg>
                    </button>
                </div>
                
                <!-- 设置按钮 -->
                <button id="toolbarSettingsBtn" class="toolbar-settings-btn" title="设置">
                    <svg class="toolbar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
                
                <!-- Provider 切换 Toggle -->
                <div class="flex items-center gap-1 bg-white rounded-full shadow-lg px-2 py-1">
                    <span id="providerToggleLabel" class="text-xs font-medium text-gray-500">当前</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="providerToggle" class="sr-only peer">
                        <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                    <span id="providerToggleLabelDynamic" class="text-xs font-medium text-gray-400">动态</span>
                </div>
            </div>
        </div>
        
        
        <!-- 画布中心标记 -->
        <div id="canvasCenterMarker" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none hidden">
            <div class="w-2 h-2 bg-red-500 rounded-full"></div>
            <div class="text-xs text-red-500 mt-2 whitespace-nowrap">中心坐标: (0, 0)</div>
        </div>
    </div>

    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-[1000] p-4">
        <div class="bg-white rounded-2xl p-6 max-w-[95vw] max-h-[95vh] w-full shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-4 flex-shrink-0">
                <h3 class="text-lg font-semibold text-gray-900">图片预览</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="flex justify-center mb-6 flex-grow overflow-auto">
                <img id="modalImage" class="max-w-full max-h-[75vh] rounded-lg object-contain" alt="预览图片">
            </div>
            <div class="flex justify-end gap-3 flex-shrink-0">
                <button id="openFolderBtn" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors">打开文件夹</button>
                <button id="closeModalBtn2" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors">关闭</button>
                <button id="downloadModalBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-colors">下载</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-[100002] p-4">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl">
            <div class="flex items-center mb-4">
                <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center mr-3">
                    <span class="text-red-600 text-xl">⚠️</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-900">确认删除</h3>
            </div>
            <p class="text-gray-600 mb-4" id="confirmModalMessage">确定要删除这张图片吗？</p>
            <div class="flex items-center mb-6">
                <input type="checkbox" id="confirmModalCheckbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                <label for="confirmModalCheckbox" class="ml-2 text-sm text-gray-600">不再提醒</label>
            </div>
            <div class="flex justify-end gap-3">
                <button id="confirmModalCancel" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors">取消</button>
                <button id="confirmModalOk" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition-colors">删除</button>
            </div>
        </div>
    </div>

    <!-- 保存成功提示模态框 -->
    <div id="saveSuccessModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-[100002] p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <div class="flex items-center mb-4">
                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center mr-3">
                    <span class="text-green-600 text-xl">✓</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-900">保存成功</h3>
            </div>
            <p class="text-gray-600 mb-6" id="saveSuccessModalMessage">设置已成功保存</p>
            <div class="flex justify-end">
                <button id="saveSuccessModalOk" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700 transition-colors">确定</button>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>
    
    <script type="module">
        import { CONFIG, migrateOldStorageFormat, getModelDisplayName } from "./config.js";
        import { AppState, CanvasState } from "./js/app-state.js";
        import { PinManager } from "./js/pin-manager.js";
        import { apiClient, initializeAPIClient } from "./js/api-client.js";
        import { ProviderManager } from "./js/providers.js";
        import { UIManager } from "./js/ui.js";
        import "./js/node-factory.js";
        import "./js/main.js";
        import { TemplateLoader } from "./js/template-loader.js";
        import { DebugConsole } from "./js/debug-console.js";
        import { updateResolutionOptions, updateAddButtonVisibility, createModelItem, setupStatusClose, adjustBaseUrlInputWidth, debugLog } from "./js/utils.js";
        import { initCanvasElements, initCanvas, resetCanvas, refreshUI, updateCenterMarkerCoordinates, updateImageCenterCoordinates, updateMinimapViewport, updateMinimapWithImage, updateCanvasScale, updateToolbarPosition, getPanzoom, getImageResponseContainer } from "./js/canvas-manager.js";
        import { initNodeManager, selectNode, deselectAllNodes, copySelectedNode, cutSelectedNode, deleteSelectedNode, createImageNode, createTextNode, getSelectedNode, getNodeCounter, incrementNodeCounter } from "./js/node-manager.js";
        import { handleAPICall } from "./js/api-operations.js";
        import { createLoadingPlaceholder, createTextLoadingPlaceholder, updateLoadingPlaceholder, updateTextLoadingPlaceholder } from "./js/loading-placeholder.js";

        const sendBtn = document.getElementById('sendBtn');
        const promptInput = document.getElementById('promptInput');
        const loader = document.getElementById('loader');
        const statusTag = document.getElementById('statusTag');
        const videoRatioSelect = document.getElementById('videoRatioSelect');
        const videoResolutionSelect = document.getElementById('videoResolutionSelect');
        const videoDurationSelect = document.getElementById('videoDurationSelect');
        window.currentMode = 'image';
        const aspectRatio = document.getElementById('aspectRatio');
        const imageSize = document.getElementById('imageSize');
        const temperature = document.getElementById('temperature');
        const topP = document.getElementById('topP');
        const temperatureValue = document.getElementById('temperatureValue');
        const topPValue = document.getElementById('topPValue');
        const imageResponseContainer = document.getElementById('imageResponseContainer');
        
        PinManager.setPromptInput(promptInput);
        updateResolutionOptions();
        initializeAPIClient({
            promptInput: promptInput,
            debugLog: debugLog,
            statusTag: statusTag,
            loader: loader
        });
        const saved12AIKey = window.ENV?.['12AI_API_KEY'] || localStorage.getItem('12AI_API_KEY') || '';
        migrateOldStorageFormat();
        if (saved12AIKey) {

        function updateModelSelectsState(containers, format) {
            containers.forEach(containerId => {
                const container = document.getElementById(containerId);

                selects.forEach(select => {
                    if (format === 'mix') {
                        select.disabled = false;
                        select.classList.remove('opacity-50', 'cursor-not-allowed');
                    } else {
                        select.disabled = true;
                        select.classList.add('opacity-50', 'cursor-not-allowed');
                        select.value = format;
                    }
                });
            });
        }

                        const selectedFormat = e.target.value;
                        updateModelSelectsState(config.containers, selectedFormat);
                    });
                });
            });

            formatConfigs.forEach(config => {

                    const formatConfig = formatConfigs.find(fc => fc.containers.includes(config.containerId));
                    if (formatConfig) {

            const toolbarBottom = debugConsoleHeight + 16;
            
            miniToolbar.style.bottom = `${toolbarBottom}px`;
            
            const minimapBottom = debugConsoleHeight + 16;
            if (canvasMinimap) {
                canvasMinimap.style.bottom = `${minimapBottom}px`;
            }
        };

        document.addEventListener('mousemove', (e) => {
            if (AppState.isDraggingNode && AppState.dragNode) {
                const scale = getPanzoom().getScale();
                const deltaX = (e.clientX - AppState.dragStartX) / scale;
                const deltaY = (e.clientY - AppState.dragStartY) / scale;
                
                const newLeft = AppState.dragNodeStartLeft + deltaX;
                const newTop = AppState.dragNodeStartTop + deltaY;
                
                AppState.dragNode.style.left = `${newLeft}px`;
                AppState.dragNode.style.top = `${newTop}px`;
                
                updateImageCenterCoordinates(AppState.dragNode);
                
                updateMinimapWithImage(AppState.dragNode);
                
                if (DebugConsole.showMouseLogs) {
                    debugLog(`拖动图片: delta=(${deltaX},${deltaY}), newPos=(${newLeft},${newTop}), scale=${scale}`, 'event');
                }
            }
            
            if (AppState.isMiddleMouseDown && !AppState.isDraggingNode) {
                const deltaX = e.clientX - AppState.lastMouseX;
                const deltaY = e.clientY - AppState.lastMouseY;
                
                const newPanX = AppState.panX + deltaX;
                const newPanY = AppState.panY + deltaY;
                
                const minPanX = -8000;
                const maxPanX = 8000;
                const minPanY = -8000;
                const maxPanY = 8000;
                
                AppState.panX = Math.max(minPanX, Math.min(newPanX, maxPanX));
                AppState.panY = Math.max(minPanY, Math.min(newPanY, maxPanY));
                
                requestAnimationFrame(() => {
                    const scale = getPanzoom().getScale();
                    canvas.style.transform = `translate(${AppState.panX}px, ${AppState.panY}px) scale(${scale})`;
                    updateMinimapViewport();
                    updateCenterMarkerCoordinates();
                });
                
                AppState.lastMouseX = e.clientX;
                AppState.lastMouseY = e.clientY;
                
                if (Math.abs(deltaX) > 1 || Math.abs(deltaY) > 1) {
                    if (!debugConsole.contains(e.target) && DebugConsole.showMouseLogs) {
                        debugLog(`画布拖动: deltaX=${deltaX}, deltaY=${deltaY}, panX=${AppState.panX}, panY=${AppState.panY}`, 'event');
                    }
                }
            }
            
            if (AppState.isResizingNode && AppState.resizeNode) {
                const deltaX = e.clientX - AppState.resizeStart.x;
                const deltaY = e.clientY - AppState.resizeStart.y;
                const delta = (deltaX >= 0 || deltaY >= 0) ? Math.max(deltaX, deltaY) : Math.min(deltaX, deltaY);
                
                const aspectRatio = AppState.resizeStart.width / AppState.resizeStart.height;
                let newWidth = AppState.resizeStart.width + delta;
                let newHeight = newWidth / aspectRatio;
                
                if (newWidth > 50 && newHeight > 50) {
                    const img = AppState.resizeNode.querySelector('img');
                    img.style.width = `${newWidth}px`;
                    img.style.height = `${newHeight}px`;
                    updateMinimapWithImage(AppState.resizeNode);
                    PinManager.refreshPinsOnNode(AppState.resizeNode);
                }
            }
        });

                debugLog(`[鼠标抬起] 全局: button=${e.button}, clientX=${e.clientX}, clientY=${e.clientY}`, 'event');
