<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍌 Nano Generator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="panzoom.min.js"></script>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/reference-shelf.css">
    <link rel="stylesheet" href="css/mention-panel.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 overflow-hidden">
    <div id="text-measure" class="absolute invisible whitespace-nowrap text-sm px-3 py-2 font-sans"></div>

    <!-- 全屏画布层 -->
    <div id="canvasLayer" class="fixed inset-0 z-0 pointer-events-auto">
        <div id="canvasViewport" class="w-full h-full">
            <div id="canvas" class="absolute origin-center">
                <!-- 调试网格 -->
                <div id="debugGrid" class="absolute inset-0 pointer-events-none hidden">
                    <svg width="10000" height="10000" viewBox="0 0 10000 10000" xmlns="http://www.w3.org/2000/svg" id="debugGridSvg">
                    </svg>
                </div>
                <div id="imageResponseContainer">
                </div>
            </div>
        </div>
    </div>

    <!-- UI悬浮层 -->
    <div id="uiLayer" class="fixed inset-0 z-10 pointer-events-none">
        <!-- 标题 -->
        <header class="pointer-events-auto absolute top-4 left-4 flex items-center gap-3">
            <svg width="48" height="48" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                <defs>
                    <linearGradient id="solid_n_grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#2563EB" />
                        <stop offset="100%" stop-color="#7C3AED" />
                    </linearGradient>
                </defs>
                <path
                    class="logo-path"
                    d="M 30 70 V 30 L 70 70 V 30"
                    stroke="url(#solid_n_grad)"
                    stroke-width="10"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    fill="none"
                    stroke-dasharray="220"
                    stroke-dashoffset="220"
                >
                    <animate 
                      attributeName="stroke-dashoffset" 
                      values="220; 0; 0; -220; -220" 
                      keyTimes="0; 0.2; 0.79; 0.99; 1" 
                      dur="6s" 
                      repeatCount="indefinite"
                      calcMode="spline"
                      keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1; 0 0 1 1"
                    />
                </path>
            </svg>
            <h1 class="text-2xl font-bold text-gray-900">Nano Generator</h1>
        </header>

        <!-- 可拖动的UI面板 -->
        <div id="uiPanel" class="pointer-events-auto absolute w-[400px] max-w-[90vw] max-h-[calc(100vh-160px)] overflow-y-auto" style="bottom: 120px; right: 30px; top: auto; left: auto;">
<!-- 提示词面板 -->
            <div class="minimal-panel p-4 shadow-sm pointer-events-auto">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-medium text-gray-700">提示词面板</label>
                    <button id="togglePromptPanel" class="text-sm text-blue-600 hover:text-blue-700">折叠</button>
                </div>
                <div id="promptPanel">
                    <!-- 引用内容货架 (Reference Shelf) -->
                    <div id="referenceShelf" class="mb-2 border-b border-gray-100">
                        <!-- 动态插入引用项 -->
                    </div>
                    <input type="file" id="shelfFileInput" class="hidden" accept="image/*,video/*,audio/*" multiple>

                    <div id="promptContainer" class="w-full px-3 py-1.5 rounded-xl border border-gray-200 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent outline-none transition-all bg-white min-h-[100px]">
                        <div id="promptInput" contenteditable="true" 
                            class="w-full border-none outline-none resize-none bg-transparent text-gray-700 placeholder-gray-400 whitespace-pre-wrap text-sm"
                            data-placeholder="请输入提示词，&#10;Ctrl + Enter直接发送，&#10;Enter进行换行。"></div>
                    </div>
                    
                    <!-- 任务类型 Tab -->
                    <div class="mt-4 flex border border-gray-200 rounded-lg overflow-hidden bg-white w-full">
                        <button id="tabText" class="flex-1 min-w-0 py-2 px-3 text-sm font-medium bg-gray-50 text-gray-700 hover:bg-blue-50 flex items-center justify-center">
                            文本
                        </button>
                        <button id="tabImage" class="flex-1 min-w-0 py-2 px-3 text-sm font-medium bg-blue-600 text-white flex items-center justify-center">
                            图片
                        </button>
                        <button id="tabVideo" class="flex-1 min-w-0 py-2 px-3 text-sm font-medium bg-gray-50 text-gray-700 hover:bg-purple-50 flex items-center justify-center">
                            视频
                        </button>
                        <button id="tabAudio" class="flex-1 min-w-0 py-2 px-3 text-sm font-medium bg-gray-50 text-gray-700 hover:bg-pink-50 flex items-center justify-center">
                            音频
                        </button>
                    </div>
                    
                    <!-- 模型参数 -->
                    <div id="modelParams" class="mt-4">
                        <h3 class="text-sm font-semibold text-gray-700 mb-3">模型参数</h3>
                        
                        <!-- 图片模式参数 -->
                        <div id="imageParams">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">图片模型</label>
                                    <div class="custom-select-wrapper" id="imageModelNameWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">选择模型</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">宽高比</label>
                                    <div class="custom-select-wrapper" id="aspectRatioWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">1:1</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">分辨率</label>
                                <div class="custom-select-wrapper" id="imageSizeWrapper">
                                    <div class="custom-select-trigger">
                                        <span class="selected-text">1K (1024×1024)</span>
                                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 视频模式参数 -->
                        <div id="videoParams" class="hidden">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">视频模型</label>
                                    <div class="custom-select-wrapper" id="videoModelNameWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">选择模型</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">视频比例</label>
                                    <div class="custom-select-wrapper" id="videoRatioWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">16:9 横屏</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">视频时长</label>
                                    <div class="custom-select-wrapper" id="videoDurationWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">6 秒</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">分辨率</label>
                                    <div class="custom-select-wrapper" id="videoResolutionWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">720p</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 文本模式参数 -->
                        <div id="textParams" class="hidden">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">文本/识图模型</label>
                                    <div class="custom-select-wrapper" id="textModelNameWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">选择模型</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Temperature</label>
                                    <input type="number" id="temperature" value="0.7" min="0" max="1" step="0.1" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Top P</label>
                                    <input type="number" id="topP" value="0.95" min="0" max="1" step="0.05" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                                </div>
                            </div>
                        </div>

                        <!-- 音频模式参数 -->
                        <div id="audioParams" class="hidden">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="col-span-2">
                                    <label class="block text-xs text-gray-500 mb-1">音频/音乐模型</label>
                                    <div class="custom-select-wrapper" id="audioModelNameWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">选择模型</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">音频时长 (秒)</label>
                                    <div class="custom-select-wrapper" id="audioDurationWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">15 秒</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">音频格式</label>
                                    <div class="custom-select-wrapper" id="audioFormatWrapper">
                                        <div class="custom-select-trigger">
                                            <span class="selected-text">mp3</span>
                                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex justify-between items-center">
                        <span id="statusTag" class="text-xs px-2 py-1 rounded bg-gray-50 text-gray-600">就绪</span>
                        <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium text-sm flex items-center gap-2">
                            <span>发送</span>
                            <div id="loader" class="hidden animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 调试控制台 -->
        <div id="debugConsole" class="debug-console collapsed pointer-events-auto">
            <div class="debug-console-header">
                <span class="debug-console-title">调试控制台面板</span>
                <span class="debug-console-toggle">▼</span>
            </div>
            <div class="debug-console-content" id="debugConsoleContent">
            </div>
            <div class="debug-console-footer">
                <div class="debug-console-footer-left">
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleMouse" class="debug-console-mouse-checkbox">
                        <span>显示鼠标日志</span>
                    </label>
                </div>
                <div class="debug-console-footer-center">
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleMarker" class="debug-console-mouse-checkbox">
                        <span>中心标记</span>
                    </label>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleGrid" class="debug-console-mouse-checkbox">
                        <span>调试网格</span>
                    </label>
                    <span class="debug-console-divider">|</span>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleSample" class="debug-console-mouse-checkbox">
                        <span>样例图片</span>
                    </label>
                    <span class="debug-console-divider">|</span>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleCoords" class="debug-console-mouse-checkbox">
                        <span>节点坐标</span>
                    </label>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleTime" class="debug-console-mouse-checkbox" checked>
                        <span>生成耗时</span>
                    </label>
                    <label class="debug-console-mouse-label">
                        <input type="checkbox" id="debugConsoleToggleModelTag" class="debug-console-mouse-checkbox" checked>
                        <span>模型标签</span>
                    </label>
                </div>
                <div class="debug-console-footer-right">
                    <button class="debug-console-clear" id="debugConsoleClear">清空</button>
                </div>
            </div>
        </div>

        <!-- 画布缩略图 -->
        <div id="canvasMinimap" class="fixed left-4 z-20 pointer-events-auto">
            <div class="minimap-container">
                <div class="minimap-header">
                    <span class="minimap-title">画布导航</span>
                </div>
                <div id="minimapContent" class="minimap-content">
                    <div id="minimapCanvas" class="minimap-canvas">
                        <div id="minimapViewport" class="minimap-viewport"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 迷你工具栏 -->
        <div id="miniToolbar" class="fixed left-1/2 transform -translate-x-1/2 z-20 pointer-events-auto">
            <div class="flex items-center gap-2">
                <button id="uploadImageBtn" class="toolbar-upload-btn">
                    <svg class="toolbar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </button>
                <input type="file" id="imageUploadInput" accept="image/*" class="hidden">
                
                <!-- 缩放控制按钮 -->
                <div class="zoom-controls-track">
                    <button id="toolbarZoomReset" class="zoom-track-btn" title="重置缩放">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                    </button>
                    <button id="toolbarZoomOut" class="zoom-track-btn" title="缩小">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            <line x1="8" y1="11" x2="14" y2="11"></line>
                        </svg>
                    </button>
                    <span id="toolbarZoomValue" class="zoom-track-value" title="点击重置">100%</span>
                    <button id="toolbarZoomIn" class="zoom-track-btn" title="放大">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            <line x1="11" y1="8" x2="11" y2="14"></line>
                            <line x1="8" y1="11" x2="14" y2="11"></line>
                        </svg>
                    </button>
                    <button id="toolbarCenterCanvas" class="zoom-track-btn" title="回到画布中心">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <line x1="12" y1="2" x2="12" y2="6"></line>
                            <line x1="12" y1="18" x2="12" y2="22"></line>
                            <line x1="2" y1="12" x2="6" y2="12"></line>
                            <line x1="18" y1="12" x2="22" y2="12"></line>
                        </svg>
                    </button>
                </div>
                
                <!-- 设置按钮 -->
                <button id="toolbarSettingsBtn" class="toolbar-settings-btn" title="设置">
                    <svg class="toolbar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
                
                <!-- Provider 切换 Toggle -->
                <div id="providerToggleContainer" class="flex items-center gap-1 bg-white rounded-full shadow-lg px-2 py-1">
                    <span id="providerToggleLabel" class="text-xs font-medium text-gray-500">仅预览</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="providerToggle" class="sr-only peer">
                        <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                    <span id="providerToggleLabelDynamic" class="text-xs font-medium text-gray-400">本地存盘</span>
                    <span id="storageWarning" class="hidden text-amber-500 text-xs ml-1" title="当前环境（如 Serverless）不支持本地文件写入">⚠️</span>
                </div>
            </div>
        </div>

        </div>
        
        <!-- 画布中心标记 -->
        <div id="canvasCenterMarker" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none hidden">
            <div class="w-2 h-2 bg-red-500 rounded-full"></div>
            <div class="text-xs text-red-500 mt-2 whitespace-nowrap">中心坐标: (0, 0)</div>
        </div>
    </div>

    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-[1000] p-4">
        <div class="bg-white rounded-2xl p-6 max-w-[95vw] max-h-[95vh] w-full shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">图片预览</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="flex-1 flex items-center justify-center overflow-auto">
                <img id="modalImage" class="max-w-full max-h-full object-contain" src="" alt="Preview">
            </div>
            <div class="mt-4 flex justify-end gap-3">
                <button id="openFolderBtn" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">打开文件夹</button>
                <button id="downloadModalBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-colors">下载图片</button>
                <button id="closeModalBtn2" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">关闭</button>
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-[10003]">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl relative">
            <button id="confirmModalClose" class="absolute top-4 right-4 w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <h3 id="confirmModalTitle" class="text-lg font-bold text-gray-800 mb-4">确认</h3>
            <p id="confirmModalMessage" class="text-gray-600 mb-6"></p>
            
            <div class="flex items-center gap-2 mb-6">
                <input type="checkbox" id="confirmModalCheckbox" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 focus:ring-2">
                <label for="confirmModalCheckbox" class="text-sm text-gray-500 cursor-pointer">不再询问 (本次会话)</label>
            </div>

            <div class="flex justify-end gap-3">
                <button id="confirmModalCancel" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">取消</button>
                <button id="confirmModalOk" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-colors">确定</button>
            </div>
        </div>
    </div>

    <!-- 保存成功提示（轻量级Toast） -->
    <div id="saveSuccessModal" class="fixed top-4 left-1/2 transform -translate-x-1/2 hidden items-center gap-2 px-4 py-3 rounded-xl bg-gray-900 text-white shadow-xl z-[10004] transition-all duration-300 translate-y-[-100px] opacity-0">
        <svg class="w-5 h-5 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span id="saveSuccessModalMessage" class="text-sm font-medium"></span>
        <button id="saveSuccessModalOk" class="ml-2 text-gray-400 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "./js/lib/genai.js"
      }
    }
    </script>
    
    <script type="module">
        import { App } from "./js/app.js";
        window.addEventListener('load', async () => await App.init());
    </script>

    <!-- 连线引用遮罩层 -->
    <svg id="linkerOverlay" class="fixed inset-0 w-full h-full pointer-events-none z-[9999]" style="display: none;">
        <path id="linkerPath" d="" fill="none" stroke="rgba(59, 130, 246, 0.6)" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite" />
        </path>
        <circle id="linkerEndCircle" r="5" fill="#3b82f6" style="display: none;" />
    </svg>
    <!-- 终极硬化版：右上角管理面板 (不再依赖外部CSS类提供尺寸) -->
    <div style="position: fixed !important; top: 20px !important; right: 20px !important; z-index: 999999 !important; font-family: sans-serif !important;" class="pointer-events-auto">
        <div style="position: relative !important;" id="canvasManagerWrapper">
            
            <!-- 触发按钮：固定尺寸与样式 -->
            <button id="canvasManagerBtn" style="display: flex !important; align-items: center !important; gap: 10px !important; padding: 10px 20px !important; background: white !important; border: 1px solid #e5e7eb !important; border-radius: 9999px !important; cursor: pointer !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1) !important; outline: none !important;">
                <span id="canvasIconContainer" style="display: flex !important; align-items: center !important;"></span>
                <span style="font-size: 14px !important; font-weight: 700 !important; color: #374151 !important; white-space: nowrap !important;">画布快照管理</span>
                <svg style="width: 14px !important; height: 14px !important; color: #9ca3af !important;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <!-- 面板：强制 320px 宽度 -->
            <div id="canvasManagerPanel" class="hidden" style="position: absolute !important; top: 100% !important; right: 0px !important; width: 320px !important; background: white !important; margin-top: 12px !important; border-radius: 16px !important; border: 1px solid #f3f4f6 !important; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04) !important; overflow: hidden !important; z-index: 1000000 !important;">
                
                <!-- 头部 -->
                <div style="padding: 20px !important; border-bottom: 1px solid #f9fafb !important; display: flex !important; align-items: center !important; gap: 12px !important;">
                    <div style="width: 4px !important; height: 24px !important; background: #2563eb !important; border-radius: 2px !important;"></div>
                    <div style="display: flex !important; flex-direction: column !important; align-items: flex-start !important;">
                        <span style="font-size: 15px !important; font-weight: 900 !important; color: #111827 !important; white-space: nowrap !important; line-height: 1 !important;">快照存档中心</span>
                        <span style="font-size: 10px !important; color: #9ca3af !important; font-weight: 700 !important; text-transform: uppercase !important; letter-spacing: 1px !important; margin-top: 4px !important;">Canvas Snapshot Engine</span>
                    </div>
                </div>
                
                <!-- 列表区域 -->
                <div style="padding: 8px !important; display: flex !important; flex-direction: column !important; gap: 4px !important;">

                    <button id="exportCanvasBtn" style="width: 100% !important; display: flex !important; align-items: center !important; gap: 16px !important; padding: 12px 16px !important; background: transparent !important; border: none !important; border-radius: 12px !important; cursor: pointer !important; text-align: left !important; transition: background 0.2s !important;" onmouseover="this.style.background='#f0f7ff'" onmouseout="this.style.background='transparent'">

                        <div style="display: flex !important; flex-direction: column !important; align-items: flex-start !important;">

                            <span style="font-size: 11px !important; color: #9ca3af !important; white-space: nowrap !important; margin-top: 2px !important;">将当前画布保存到本地</span>
                        </div>
                    </button>
                    
                    <!-- 导入 -->
                    <button id="importCanvasBtn" style="width: 100% !important; display: flex !important; align-items: center !important; gap: 16px !important; padding: 12px 16px !important; background: transparent !important; border: none !important; border-radius: 12px !important; cursor: pointer !important; text-align: left !important; transition: background 0.2s !important;" onmouseover="this.style.background='#f5f3ff'" onmouseout="this.style.background='transparent'">
                        <div style="width: 40px !important; height: 40px !important; background: #f5f3ff !important; border-radius: 10px !important; display: flex !important; align-items: center !important; justify-content: center !important; color: #7c3aed !important;" id="importIcon"></div>
                        <div style="display: flex !important; flex-direction: column !important; align-items: flex-start !important;">
                            <span style="font-size: 14px !important; font-weight: 700 !important; color: #1f2937 !important; white-space: nowrap !important;">导入镜像 (Restore)</span>
                            <span style="font-size: 11px !important; color: #9ca3af !important; white-space: nowrap !important; margin-top: 2px !important;">从 JSON 文件恢复工作流</span>

                    </button>

                <!-- 页脚 -->
                <div style="padding: 12px 20px !important; background: #f9fafb !important; border-top: 1px solid #f3f4f6 !important; display: flex !important; justify-content: space-between !important; align-items: center !important;">
                    <span style="font-size: 10px !important; font-weight: 800 !important; color: #9ca3af !important; letter-spacing: 0.5px !important;">SYSTEM READY</span>
                    <span id="lastActionStatus" style="font-size: 10px !important; color: #3b82f6 !important; font-weight: 800 !important;">v1.1.2</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 隐藏的导入触发器 -->
    <input type="file" id="canvasImportInput" accept=".json" style="display: none;">
</body>
