        async function handleAPICall() {
            debugLog(`[开始调用] handleAPICall 函数`, 'info');
            
            updateImageDataList();
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = promptInput.innerHTML;
            const imageTags = tempDiv.querySelectorAll('.pasted-image-item');
            imageTags.forEach(tag => tag.remove());
            
            const pinnedImageTags = tempDiv.querySelectorAll('.pinned-image-tag');
            let processedPrompt = tempDiv.textContent.trim();
            
            const pinInfo = [];
            pinnedImageTags.forEach(tag => {
                const imageUrl = tag.dataset.imageUrl;
                const pinNumber = tag.dataset.pinNumber;
                const filename = tag.querySelector('.pin-filename').textContent;
                
                const node = PinManager.findNodeByImageUrl(imageUrl);
                if (node) {
                    const pins = JSON.parse(node.dataset.pins || '[]');
                    const pin = pins.find(p => p.number == pinNumber);
                    if (pin) {
                        pinInfo.push({
                            imageUrl: imageUrl,
                            pinNumber: pinNumber,
                            filename: filename,
                            x: pin.x,
                            y: pin.y
                        });
                    }
                }
            });
            
            if (pinInfo.length > 0) {
                pinInfo.forEach(info => {
                    const pinTag = `[${info.pinNumber}]`;
                    if (processedPrompt.includes(pinTag)) {
                        processedPrompt = processedPrompt.replace(pinTag, `[图片中 PIN ${info.pinNumber} 标记的位置]`);
                    }
                });
            }
            
            const prompt = processedPrompt;
            const isImageGenMode = currentMode === 'image';
            
            debugLog(`[参数检查] 模式: ${currentMode}, 提示词: "${prompt}", 图片数量: ${imageDataList.length}, PIN数量: ${pinInfo.length}`, 'info');
            
            let modelName;
            let modelProvider;
            
            if (currentMode === 'image') {
                modelName = CONFIG.IMAGE_MODEL_NAME;
                modelProvider = CONFIG.IMAGE_MODEL_PROVIDER;
            } else if (currentMode === 'text') {
                modelName = CONFIG.MODEL_NAME;
                modelProvider = CONFIG.MODEL_PROVIDER;
            } else {
                modelName = CONFIG.VIDEO_MODEL_NAME;
                modelProvider = CONFIG.VIDEO_MODEL_PROVIDER;
            }
            
            const modelDisplayName = getModelDisplayName(modelName, modelProvider);
            
            const generationConfig = {
                temperature: parseFloat(temperature.value),
                topP: parseFloat(topP.value),
                topK: 40,
                maxOutputTokens: 8192
            };
            
            if (isImageGenMode) {
                generationConfig.imageConfig = {
                    aspectRatio: aspectRatio.value,
                    imageSize: imageSize.value
                };
            }
            
            debugLog(`[模型配置] 模型: ${modelName}, 温度: ${generationConfig.temperature}, TopP: ${generationConfig.topP}`, 'info');
            
            let allImageData = [...imageDataList];
            
            for (const info of pinInfo) {
                const node = PinManager.findNodeByImageUrl(info.imageUrl);
                if (node) {
                    const img = node.querySelector('img');
                    const pins = JSON.parse(node.dataset.pins || '[]');
                    
                    let base64Data;
                    if (img.src.startsWith('data:')) {
                        base64Data = img.src;
                    } else {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.naturalWidth || img.width;
                        canvas.height = img.naturalHeight || img.height;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        base64Data = canvas.toDataURL('image/png');
                    }
                    
                    if (pins.length > 0) {
                        debugLog(`[PIN标记] 在图片上绘制 ${pins.length} 个PIN标记`, 'info');
                        base64Data = await drawPinsOnImage(base64Data, pins);
                    }
                    
                    const existing = allImageData.find(data => data.data === base64Data);
                    if (!existing) {
                        allImageData.push({
                            data: base64Data,
                            name: info.filename
                        });
                    }
                }
            }
            
            activeRequests++;
            if (activeRequests === 1) {
                loader.classList.remove('hidden');
                if (statusTag) {
                    statusTag.innerText = "请求中";
                    statusTag.className = "text-xs px-2 py-1 rounded bg-blue-50 text-blue-600";
                }
            }
            
            debugLog(`[请求状态] 活跃请求数: ${activeRequests}`, 'info');
            imageResponseContainer.classList.remove('hidden');
            
            let loadingPlaceholder = null;
            if (isImageGenMode) {
                const aspectRatioValue = aspectRatio.value;
                const imageSizeValue = imageSize.value;
                
                let width, height;
                const baseSize = imageSizeValue === '512px' ? 512 : imageSizeValue === '1K' ? 1024 : imageSizeValue === '2K' ? 2048 : 3840;
                
                switch (aspectRatioValue) {
                    case '1:1': width = baseSize; height = baseSize; break;
                    case '16:9': width = baseSize; height = Math.round(baseSize * 9 / 16); break;
                    case '9:16': width = Math.round(baseSize * 9 / 16); height = baseSize; break;
                    case '21:9': width = baseSize; height = Math.round(baseSize * 9 / 21); break;
                    case '4:3': width = baseSize; height = Math.round(baseSize * 3 / 4); break;
                    case '3:4': width = Math.round(baseSize * 3 / 4); height = baseSize; break;
                    case '3:2': width = baseSize; height = Math.round(baseSize * 2 / 3); break;
                    case '2:3': width = Math.round(baseSize * 2 / 3); height = baseSize; break;
                    case '5:4': width = baseSize; height = Math.round(baseSize * 4 / 5); break;
                    case '4:5': width = Math.round(baseSize * 4 / 5); height = baseSize; break;
                    default: width = baseSize; height = Math.round(baseSize * 9 / 16);
                }
                
                const displayWidth = Math.min(width, 300);
                const displayHeight = Math.round(displayWidth * height / width);
                
                const existingNodes = imageResponseContainer.querySelectorAll('.canvas-node');
                let x = 5000;
                let y = 5000;
                
                if (existingNodes.length > 0) {
                    const lastNode = existingNodes[existingNodes.length - 1];
                    const lastNodeX = parseInt(lastNode.style.left) || 0;
                    const lastNodeY = parseInt(lastNode.style.top) || 0;
                    const lastNodeWidth = lastNode.offsetWidth;
                    const lastNodeHeight = lastNode.offsetHeight;
                    
                    x = lastNodeX + lastNodeWidth + 50;
                    y = lastNodeY;
                    
                    if (x > 6000) {
                        x = 5000;
                        y = lastNodeY + lastNodeHeight + 50;
                    }
                }
                
                loadingPlaceholder = createLoadingPlaceholder(displayWidth, displayHeight, x, y, modelDisplayName);
                imageResponseContainer.appendChild(loadingPlaceholder);
                updateMinimapWithImage(loadingPlaceholder);
                
                const imgGenStartTime = Date.now();
                const imgTimeElement = loadingPlaceholder.querySelector('.node-sidebar .node-generation-time');
                if (imgTimeElement) {
                    imgTimeElement.textContent = '⏱️ 0.0s';
                    const imgTimer = setInterval(() => {
                        const elapsed = (Date.now() - imgGenStartTime) / 1000;
                        imgTimeElement.textContent = `⏱️ ${elapsed.toFixed(1)}s`;
                    }, 100);
                    loadingPlaceholder._timer = imgTimer;
                    loadingPlaceholder._startTime = imgGenStartTime;
                }
            } else if (currentMode !== 'video') {
                const existingNodes = imageResponseContainer.querySelectorAll('.canvas-node');
                let x = 5000;
                let y = 5000;
                
                if (existingNodes.length > 0) {
                    const lastNode = existingNodes[existingNodes.length - 1];
                    const lastNodeX = parseInt(lastNode.style.left) || 0;
                    const lastNodeY = parseInt(lastNode.style.top) || 0;
                    const lastNodeWidth = lastNode.offsetWidth;
                    const lastNodeHeight = lastNode.offsetHeight;
                    
                    x = lastNodeX + lastNodeWidth + 50;
                    y = lastNodeY;
                    
                    if (x > 6000) {
                        x = 5000;
                        y = lastNodeY + lastNodeHeight + 50;
                    }
                }
                
                loadingPlaceholder = createTextLoadingPlaceholder(prompt, x, y, modelDisplayName);
                imageResponseContainer.appendChild(loadingPlaceholder);
                updateMinimapWithImage(loadingPlaceholder);
                
                const textGenStartTime = Date.now();
                const textTimeElement = loadingPlaceholder.querySelector('.node-generation-time');
                if (textTimeElement) {
                    textTimeElement.textContent = '⏱️ 0.0s';
                    const textTimer = setInterval(() => {
                        const elapsed = (Date.now() - textGenStartTime) / 1000;
                        textTimeElement.textContent = `⏱️ ${elapsed.toFixed(1)}s`;
                    }, 100);
                    loadingPlaceholder._timer = textTimer;
                    loadingPlaceholder._startTime = textGenStartTime;
                }
            }
            
            try {
                const isVideoGenMode = currentMode === 'video';
                
                if (isVideoGenMode) {
                    const apiKey = settings12AiApiKeyInput.value.trim();
                    if (!apiKey) {
                        debugLog(`[12AI] 请输入 12AI API Key`, 'error');
                        alert('请输入 12AI API Key');
                        return;
                    }
                    
                    apiClient.update12AIKey(apiKey);
                    
                    const selectedNode = AppState.selectedNode;
                    let selectedImageUrl = null;
                    if (selectedNode && selectedNode.querySelector('img')) {
                        selectedImageUrl = selectedNode.querySelector('img').src;
                    }
                    
                    const existingNodes = imageResponseContainer.querySelectorAll('.canvas-node');
                    let nodeX = 5000;
                    let nodeY = 5000;
                    
                    if (existingNodes.length > 0) {
                        const lastNode = existingNodes[existingNodes.length - 1];
                        const lastNodeX = parseInt(lastNode.style.left) || 0;
                        const lastNodeY = parseInt(lastNode.style.top) || 0;
                        const lastNodeWidth = lastNode.offsetWidth;
                        const lastNodeHeight = lastNode.offsetHeight;
                        
                        nodeX = lastNodeX + lastNodeWidth + 50;
                        nodeY = lastNodeY;
                        
                        if (nodeX > 6000) {
                            nodeX = 5000;
                            nodeY = lastNodeY + lastNodeHeight + 50;
                        }
                    }
                    
                    const videoModel = CONFIG.VIDEO_MODEL_NAME;
                    const videoProvider = CONFIG.VIDEO_MODEL_PROVIDER;
                    const videoModelDisplayName = getModelDisplayName(videoModel, videoProvider);
                    const videoPlaceholder = NodeFactory.createVideoPlaceholder(nodeX, nodeY, prompt, videoModelDisplayName, videoRatioSelect.value);
                    imageResponseContainer.appendChild(videoPlaceholder);
                    updateMinimapWithImage(videoPlaceholder);
                    selectNode(videoPlaceholder);
                    
                    const videoGenStartTime = Date.now();
                    const videoTimeElement = videoPlaceholder.querySelector('.node-sidebar .node-generation-time');
                    if (videoTimeElement) {
                        videoTimeElement.textContent = '⏱️ 0.0s';
                        const videoTimer = setInterval(() => {
                            const elapsed = (Date.now() - videoGenStartTime) / 1000;
                            videoTimeElement.textContent = `⏱️ ${elapsed.toFixed(1)}s`;
                        }, 100);
                        videoPlaceholder._timer = videoTimer;
                        videoPlaceholder._startTime = videoGenStartTime;
                    }
                    
                    await apiClient.request({
                        prompt,
                        isVideoGenMode: true,
                        videoModel: CONFIG.VIDEO_MODEL_NAME,
                        videoProvider: CONFIG.VIDEO_MODEL_PROVIDER,
                        videoRatio: videoRatioSelect.value,
                        videoResolution: videoResolutionSelect.value,
                        videoDuration: videoDurationSelect.value,
                        selectedImageUrl: selectedImageUrl,
                        onVideoProgress: (progress) => {
                            debugLog(`[视频进度] ${progress}%`, 'info');
                            if (videoPlaceholder && videoPlaceholder._updateProgress) {
                                videoPlaceholder._updateProgress(progress);
                            }
                        },
                        onVideoGenerated: async (videoUrl) => {
                            debugLog(`[视频完成] ${videoUrl}`, 'info');
                            
                            if (videoPlaceholder && videoPlaceholder._timer) {
                                clearInterval(videoPlaceholder._timer);
                                videoPlaceholder._timer = null;
                            }
                            
                            if (videoPlaceholder && videoPlaceholder._updateProgress) {
                                videoPlaceholder._updateProgress(100);
                            }
                            
                            const videoGenEndTime = Date.now();
                            const genTime = videoPlaceholder._startTime ? (videoGenEndTime - videoPlaceholder._startTime) / 1000 : 0;
                            
                            const proxyUrl = `/api/video-proxy?url=${encodeURIComponent(videoUrl)}`;
                            debugLog(`[视频代理] 使用代理URL: ${proxyUrl}`, 'info');
                            
                            try {
                                debugLog(`[保存视频] 开始保存到服务器`, 'info');
                                const saveResponse = await fetch('/api/save-video', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        videoUrl: videoUrl,
                                        prompt: prompt,
                                        aspectRatio: videoRatioSelect.value,
                                        duration: videoDurationSelect.value,
                                        modelName: videoModelDisplayName
                                    })
                                });
                                const saveResult = await saveResponse.json();
                                if (saveResult.success) {
                                    debugLog(`[保存视频] 保存成功: ${saveResult.fileName}`, 'success');
                                } else {
                                    debugLog(`[保存视频] 保存失败: ${saveResult.error}`, 'error');
                                }
                            } catch (saveError) {
                                debugLog(`[保存视频] 保存异常: ${saveError.message}`, 'error');
                            }
                            
                            NodeFactory.replaceWithVideo(videoPlaceholder, proxyUrl, prompt, videoModelDisplayName, genTime, videoRatioSelect.value);
                        },
                        onError: (error) => {
                            debugLog(`[视频错误] ${error.message}`, 'error');
                            if (videoPlaceholder) {
                                if (videoPlaceholder._timer) {
                                    clearInterval(videoPlaceholder._timer);
                                }
                                videoPlaceholder.remove();
                            }
                        }
                    });
                    
                    nodeCounter++;
                    return;
                }
                
                await apiClient.request({
                    prompt,
                    images: allImageData,
                    pinInfo,
                    modelName,
                    modelProvider,
                    generationConfig,
                    isImageGenMode,
                    aspectRatio: aspectRatio.value,
                    imageSize: imageSize.value,
                    onImageGenerated: async (imageData) => {
                        debugLog(`[API响应] 收到响应, 候选数量: 1`, 'info');
                        
                        const byteCharacters = atob(imageData);
                        const byteNumbers = new Array(byteCharacters.length);
                        for (let i = 0; i < byteCharacters.length; i++) {
                            byteNumbers[i] = byteCharacters.charCodeAt(i);
                        }
                        const byteArray = new Uint8Array(byteNumbers);
                        const blob = new Blob([byteArray], { type: 'image/png' });
                        const blobUrl = URL.createObjectURL(blob);
                        
                        let filename = '';
                        let resolution = '';
                        
                        try {
                            debugLog(`[保存图片] 开始保存到服务器`, 'info');
                            const saveResponse = await fetch('/save-image', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ 
                                    imageData: imageData,
                                    prompt: prompt,
                                    aspectRatio: aspectRatio.value,
                                    imageSize: imageSize.value
                                })
                            });
                            const saveResult = await saveResponse.json();
                            debugLog(`[保存图片] 服务器响应: ${JSON.stringify(saveResult)}`, 'info');
                            if (saveResult.success) {
                                filename = saveResult.fileName || '';
                                debugLog(`[保存图片] 文件名: ${filename}`, 'success');
                                if (statusTag) statusTag.innerText = "成功";
                            } else {
                                debugLog(`[保存图片] 保存失败: ${saveResult.message || '未知错误'}`, 'error');
                                if (statusTag) statusTag.innerText = "保存失败";
                            }
                        } catch (saveError) {
                            console.error('保存图片失败:', saveError);
                            debugLog(`[保存图片] 异常: ${saveError.message}`, 'error');
                            if (statusTag) statusTag.innerText = "保存失败";
                        }
                        
                        const tempImg = new Image();
                        tempImg.src = blobUrl;
                        await new Promise((resolve) => {
                            tempImg.onload = () => {
                                resolution = `${tempImg.naturalWidth}x${tempImg.naturalHeight}`;
                                resolve();
                            };
                        });
                        
                        if (loadingPlaceholder) {
                            const genTime = loadingPlaceholder._startTime ? (Date.now() - loadingPlaceholder._startTime) / 1000 : null;
                            updateLoadingPlaceholder(loadingPlaceholder, blobUrl, prompt, filename, resolution, genTime, modelDisplayName);
                        } else {
                            const node = createImageNode(blobUrl, prompt, nodeCounter++, filename, resolution, null, modelDisplayName);
                            imageResponseContainer.appendChild(node);
                            selectNode(node);
                        }
                        debugLog(`[创建节点] 图片节点: ${filename}, 分辨率: ${resolution}`, 'success');
                    },
                    onTextGenerated: (text) => {
                        debugLog(`[文本模式] 开始处理文本响应`, 'info');
                        debugLog(`[文本响应] 文本长度: ${text.length}`, 'info');
                        // 计算生成耗时
                        let generationTime = null;
                        if (loadingPlaceholder && loadingPlaceholder._startTime) {
                            generationTime = (Date.now() - loadingPlaceholder._startTime) / 1000;
                        }
                        if (loadingPlaceholder) {
                            updateTextLoadingPlaceholder(loadingPlaceholder, text, prompt, generationTime, modelDisplayName);
                            debugLog(`[更新节点] 文本占位符已更新`, 'success');
                        } else {
                            const node = createTextNode(text, prompt, nodeCounter++, '', '', null, modelDisplayName);
                            imageResponseContainer.appendChild(node);
                            selectNode(node);
                            updateMinimapWithImage(node);
                            debugLog(`[创建节点] 文本节点已创建`, 'success');
                        }
                    },
                    onError: (error) => {
                        console.error(error);
                        debugLog(`[API错误] 模式: ${isImageGenMode ? '生图' : '文本'}, 错误: ${error.message}`, 'error');
                        const errorText = "发生错误: " + error.message;
                        
                        // 计算生成耗时
                        let generationTime = null;
                        if (loadingPlaceholder && loadingPlaceholder._startTime) {
                            generationTime = (Date.now() - loadingPlaceholder._startTime) / 1000;
                        }
                        
                        if (loadingPlaceholder) {
                            if (loadingPlaceholder._timer) {
                                clearInterval(loadingPlaceholder._timer);
                            }
                            if (loadingPlaceholder.classList.contains('text-loading-placeholder')) {
                                updateTextLoadingPlaceholder(loadingPlaceholder, errorText, prompt, generationTime, modelDisplayName);
                                loadingPlaceholder.querySelector('.text-content').style.background = '#fef2f2';
                                loadingPlaceholder.querySelector('.text-content').style.color = '#dc2626';
                            } else {
                                const node = createTextNode(errorText, prompt, nodeCounter++, '', '', generationTime, modelDisplayName);
                                node.style.left = loadingPlaceholder.style.left;
                                node.style.top = loadingPlaceholder.style.top;
                                node.querySelector('.text-content').style.background = '#fef2f2';
                                node.querySelector('.text-content').style.color = '#dc2626';
                                imageResponseContainer.appendChild(node);
                                selectNode(node);
                                updateMinimapWithImage(node);
                                loadingPlaceholder.remove();
                            }
                        } else {
                            const node = createTextNode(errorText, prompt, nodeCounter++, '', '', null, modelDisplayName);
                            node.querySelector('.text-content').style.background = '#fef2f2';
                            node.querySelector('.text-content').style.color = '#dc2626';
                            imageResponseContainer.appendChild(node);
                            selectNode(node);
                            updateMinimapWithImage(node);
                        }
                        if (activeRequests === 0 && statusTag) {
                            statusTag.innerText = "失败";
                            statusTag.className = "text-xs px-2 py-1 rounded bg-red-50 text-red-600";
                        }
                    },
                    onComplete: (error, result) => {
                        if (!error && result) {
                            const genTime = result.generationTime;
                            
                            if (loadingPlaceholder) {
                                if (loadingPlaceholder._timer) {
                                    clearInterval(loadingPlaceholder._timer);
                                }
                                const timeElement = loadingPlaceholder.querySelector('.node-generation-time');
                                if (timeElement && genTime !== null && genTime !== undefined) {
                                    timeElement.textContent = formatGenerationTime(genTime);
                                    timeElement.title = `生成耗时: ${genTime.toFixed(2)}秒`;
                                }
                                loadingPlaceholder = null;
                            }
                        }
                    }
                });
            } finally {
                activeRequests--;
                if (activeRequests === 0) {
                    loader.classList.add('hidden');
                }
            }
        }

        sendBtn.addEventListener('click', async () => {
            await handleAPICall();
        });

        promptInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') handleAPICall();
        });

        document.addEventListener('wheel', (e) => {
            if (!e.ctrlKey) return;
            
            if (document.activeElement === promptInput) {
                e.preventDefault();
                return;
            }
            
            e.preventDefault();
            
            const currentScale = panzoom.getScale();
            const delta = e.deltaY > 0 ? -0.25 : 0.25;
            const newScale = Math.max(0.5, Math.min(2.5, currentScale + delta));
            updateCanvasScale(newScale);
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            // Ctrl + ` 切换调试控制面板
            if (e.ctrlKey && e.key === '`') {
                e.preventDefault();
                const isCollapsed = debugConsole.classList.contains('collapsed');
                debugConsole.classList.toggle('collapsed');
                void debugConsole.offsetHeight;
                if (isCollapsed) {
                    debugConsole.style.transform = 'translateY(0)';
                } else {
                    debugConsole.style.transform = 'translateY(calc(100% - 24px))';
                }
                updateToolbarPosition();
                return;
            }
            
            // 如果焦点在输入框或调试控制面板中，不执行画布快捷键
            if (document.activeElement === promptInput) return;
            if (debugConsole.contains(document.activeElement)) return;
            
            // 画布缩放快捷键（Ctrl +/-）
            if (e.ctrlKey && !e.shiftKey && (e.key === '=' || e.key === '+')) {
                e.preventDefault();
                const currentScale = panzoom.getScale();
                const newScale = Math.min(2.5, currentScale + 0.25);
                updateCanvasScale(newScale);
                return;
            }
            
            if (e.ctrlKey && !e.shiftKey && (e.key === '-' || e.key === '_')) {
                e.preventDefault();
                const currentScale = panzoom.getScale();
                const newScale = Math.max(0.5, currentScale - 0.25);
                updateCanvasScale(newScale);
                return;
            }
            
            if (selectedNode) {
                if (e.ctrlKey || e.metaKey) {
                    const selection = window.getSelection();
                    if (selection.toString().length > 0) return;
                    
                    if (e.key === 'c' || e.key === 'C') {
                        e.preventDefault();
                        copySelectedNode();
                        return;
                    }
                    if (e.key === 'x' || e.key === 'X') {
                        e.preventDefault();
                        cutSelectedNode();
                        return;
                    }
                }
                
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    e.preventDefault();
                    deleteSelectedNode();
                    return;
                }
                
                // 处理方向键移动
                const step = 10;
                const currentLeft = parseInt(selectedNode.style.left) || 0;
                const currentTop = parseInt(selectedNode.style.top) || 0;
                
                switch (e.key) {
                    case 'ArrowUp':
                        e.preventDefault();
                        selectedNode.style.top = `${currentTop - step}px`;
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        selectedNode.style.top = `${currentTop + step}px`;
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        selectedNode.style.left = `${currentLeft - step}px`;
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        selectedNode.style.left = `${currentLeft + step}px`;
                        break;
                }
            }
        });

        window.createImageNode = createImageNode;
        window.createTextNode = createTextNode;
        window.createLoadingPlaceholder = createLoadingPlaceholder;
        window.createTextLoadingPlaceholder = createTextLoadingPlaceholder;
        window.updateLoadingPlaceholder = updateLoadingPlaceholder;
        window.updateTextLoadingPlaceholder = updateTextLoadingPlaceholder;
        window.updateImageDataList = updateImageDataList;
        window.drawPinsOnImage = drawPinsOnImage;
        window.selectNode = selectNode;
        window.updateMinimapWithImage = updateMinimapWithImage;

        window.switchToTextMode = switchToTextMode;
        window.switchToImageMode = switchToImageMode;
        window.switchToVideoMode = switchToVideoMode;

        window.addEventListener('load', async () => {
            setTimeout(initCanvas, 100);
            await TemplateLoader.loadSettingsPanel();
            
            // 初始化和监听所有BASE URL输入框
            const baseUrlInputs = [
                'settingsGeminiBaseUrl',
                'settings12AiBaseUrl', 
                'settingsOpenAIBaseUrl',
                'settingsClaudeBaseUrl'
            ];
            
            baseUrlInputs.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    adjustBaseUrlInputWidth(input);
                    input.addEventListener('input', () => adjustBaseUrlInputWidth(input));
                }
            });
            
            populateSettingsModelSelects();
            
            // 初始化Provider管理和UI管理
            window.providerManager = new ProviderManager();
            new UIManager();
            
            // Provider初始化后再刷新一次下拉菜单（确保使用动态数据）
            if (typeof populateSettingsModelSelects === 'function') {
                populateSettingsModelSelects();
            }
            
            // 初始化提示词面板的模型下拉框
            if (window.modelSelectManager) {
                window.modelSelectManager.populateModelSelects();
            }
            
            // 关闭设置面板按钮（需要在模板加载后获取）
            const closeSettingsBtnAfterLoad = document.getElementById('closeSettingsBtn');
            if (closeSettingsBtnAfterLoad) {
                closeSettingsBtnAfterLoad.addEventListener('click', () => {
                    handleCloseSettingsPanel();
                });
            }
            
            // 保存设置按钮
            const saveSettingsBtnAfterLoad = document.getElementById('saveSettingsBtn');
            if (saveSettingsBtnAfterLoad) {
                saveSettingsBtnAfterLoad.addEventListener('click', () => {
                    console.log('[保存按钮点击] window.providerManager:', !!window.providerManager);
                    if (window.providerManager) {
                        window.providerManager.saveNow();
                    }
                });
            }
        });
        
        // 动态监听resize事件，当窗口大小改变时自动刷新UI
        window.addEventListener('resize', () => {
            refreshUI();
        });
    </script>
</body>
</html>
